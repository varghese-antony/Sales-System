<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#F3F4F6"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E5E7EB" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Light Bulb Icon -->
  <g transform="translate(200, 200)">
    <!-- Bulb -->
    <circle cx="0" cy="-20" r="45" fill="#D1D5DB" opacity="0.3"/>
    <path d="M -30 -20 Q -30 -60, 0 -70 Q 30 -60, 30 -20 L 30 0 Q 30 10, 20 10 L -20 10 Q -30 10, -30 0 Z" 
          fill="#9CA3AF" opacity="0.5"/>
    
    <!-- Base -->
    <rect x="-15" y="10" width="30" height="8" rx="2" fill="#9CA3AF" opacity="0.5"/>
    <rect x="-15" y="20" width="30" height="8" rx="2" fill="#9CA3AF" opacity="0.5"/>
    <rect x="-12" y="30" width="24" height="6" rx="2" fill="#9CA3AF" opacity="0.5"/>
    
    <!-- Filament -->
    <path d="M -8 -30 Q -8 -10, 0 -10 Q 8 -10, 8 -30" 
          stroke="#D1D5DB" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="320" font-family="system-ui, -apple-system, sans-serif" 
        font-size="16" fill="#6B7280" text-anchor="middle" font-weight="500">
    Product Image
  </text>
  <text x="200" y="345" font-family="system-ui, -apple-system, sans-serif" 
        font-size="14" fill="#9CA3AF" text-anchor="middle">
    Coming Soon
  </text>
</svg>
